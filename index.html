<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eagle Eye — Tank Run</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 25%, rgba(249, 115, 22, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, rgba(6, 182, 212, 0.12) 0%, transparent 45%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }
    h1 {
      margin: 0 0 0.25rem 0;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f8fafc;
      text-shadow: 0 2px 14px rgba(249, 115, 22, 0.5);
      font-size: 2rem;
    }
    .subtitle {
      color: #94a3b8;
      margin: 0 0 1rem 0;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .frame {
      position: relative;
      border: 1px solid #06b6d4;
      border-radius: 10px;
      box-shadow: 0 0 28px rgba(6, 182, 212, 0.25);
      overflow: hidden;
      background: #0f172a;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      cursor: crosshair;
    }

    /* HUD */
    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.8rem;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.85);
    }
    .hud__col { display: flex; flex-direction: column; gap: 0.35rem; }
    .hud__col--right { align-items: flex-end; }
    .hud__col--center { align-items: center; }
    .hud__label { color: #06b6d4; margin-right: 0.4rem; }
    .hud__value { color: #f8fafc; }
    .hpbar {
      width: 220px;
      height: 14px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid #475569;
      border-radius: 4px;
      overflow: hidden;
    }
    .hpbar__fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316 0%, #ea580c 100%);
      transition: width 0.15s;
    }
    .ability {
      width: 220px;
      height: 14px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid #475569;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .ability__fill {
      height: 100%;
      background: linear-gradient(90deg, #06b6d4 0%, #0891b2 100%);
    }
    .ability__label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: #f8fafc;
    }

    /* Menu / Game Over overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.94);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 1.5rem;
      z-index: 10;
      overflow-y: auto;
    }
    .overlay.hidden { display: none !important; }
    .overlay h2 {
      margin: 0 0 0.25rem 0;
      color: #f8fafc;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-size: 2rem;
      text-shadow: 0 2px 14px rgba(249, 115, 22, 0.5);
    }
    .overlay .lead {
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin: 0 0 1.25rem 0;
    }
    .section {
      width: 100%;
      max-width: 880px;
      margin-bottom: 1.25rem;
    }
    .section h3 {
      margin: 0 0 0.6rem 0;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #06b6d4;
      font-size: 0.85rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.6rem;
    }
    .card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      text-align: left;
    }
    .card:hover {
      border-color: #06b6d4;
      transform: translateY(-2px);
    }
    .card.is-selected {
      border-color: #f97316;
      box-shadow: 0 0 16px rgba(249, 115, 22, 0.4);
    }
    .card__name {
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #f8fafc;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }
    .card__stat {
      color: #94a3b8;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      margin-top: 0.2rem;
    }
    .card__stat strong { color: #06b6d4; }
    .card__desc {
      color: #cbd5e1;
      font-size: 0.78rem;
      margin-top: 0.45rem;
      line-height: 1.35;
    }
    .deploy-btn {
      margin-top: 0.4rem;
      font: inherit;
      cursor: pointer;
      padding: 0.85rem 3rem;
      border: none;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      border-radius: 6px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .deploy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.6);
    }
    .game-over-title { color: #ef4444 !important; text-shadow: 0 2px 14px rgba(239, 68, 68, 0.5) !important; }
    .controls {
      margin-top: 0.9rem;
      color: #94a3b8;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-align: center;
    }
    .controls strong { color: #06b6d4; }
    .back-link {
      margin-top: 1rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid #334155;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s, background-color 0.2s;
    }
    .back-link:hover {
      color: #e2e8f0;
      border-color: #06b6d4;
      background-color: rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body>
  <h1>Eagle Eye</h1>
  <p class="subtitle">Tank Run</p>

  <div class="frame">
    <canvas id="game" width="960" height="600"></canvas>

    <div class="hud" id="hud">
      <div class="hud__col">
        <div><span class="hud__label">Score</span><span class="hud__value" id="score">0</span></div>
        <div class="hpbar"><div class="hpbar__fill" id="hp-fill" style="width:100%"></div></div>
      </div>
      <div class="hud__col hud__col--center">
        <div><span class="hud__value" id="tank-name">—</span></div>
        <div><span class="hud__label" id="map-name">—</span></div>
      </div>
      <div class="hud__col hud__col--right">
        <div><span class="hud__label">Best</span><span class="hud__value" id="best">0</span></div>
        <div class="ability"><div class="ability__fill" id="ability-fill" style="width:100%"></div><div class="ability__label" id="ability-label">Q · Ability</div></div>
      </div>
    </div>

    <!-- Start menu -->
    <div class="overlay" id="menu">
      <h2>Deploy</h2>
      <p class="lead">Pick a tank, pick a map, fight.</p>

      <div class="section">
        <h3>Tank</h3>
        <div class="cards" id="tank-cards"></div>
      </div>
      <div class="section">
        <h3>Map</h3>
        <div class="cards" id="map-cards"></div>
      </div>

      <button class="deploy-btn" id="start-button">Start</button>
    </div>

    <!-- Game over -->
    <div class="overlay hidden" id="game-over">
      <h2 class="game-over-title">Knocked Out</h2>
      <p class="lead">Final Score <span id="final-score" style="color:#f8fafc;">0</span> · Best <span id="high-score" style="color:#f8fafc;">0</span></p>
      <button class="deploy-btn" id="restart-button">Back to Menu</button>
    </div>
  </div>

  <p class="controls">
    <strong>WASD</strong> drive &middot;
    <strong>Mouse</strong> aim &middot;
    <strong>Left Click</strong> cannon &middot;
    <strong>Right Click</strong> machine gun &middot;
    <strong>Q</strong> ability
  </p>

  <a class="back-link" href="/">Back to Hobbies</a>

  <script>
    // ============================================================
    // Eagle Eye — top-down tank game
    // ============================================================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const VIEW_W = canvas.width;
    const VIEW_H = canvas.height;

    const rand = (a, b) => a + Math.random() * (b - a);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

    // ============================================================
    // Tank definitions
    // ============================================================
    const TANKS = {
      light: {
        name: 'Light · Scout',
        speed: 200,
        hp: 70,
        cannonReload: 1.2,
        mgReload: 0.08,           // 750 RPM
        cannonDamage: 100,
        mgDamage: 25,
        bodyColor: '#ea580c',
        turretColor: '#f97316',
        ability: 'dash',
        abilityCooldown: 6,
        abilityLabel: 'Q · Dash',
        desc: 'Fast and fragile. Hit-and-run.',
      },
      medium: {
        name: 'Medium · Striker',
        speed: 150,
        hp: 100,
        cannonReload: 0.9,
        mgReload: 0.08,
        cannonDamage: 100,
        mgDamage: 25,
        bodyColor: '#ea580c',
        turretColor: '#f97316',
        ability: 'smoke',
        abilityCooldown: 12,
        abilityLabel: 'Q · Smoke',
        desc: 'Balanced. Versatile loadout.',
      },
      mbt: {
        name: 'MBT · Iron Wall',
        speed: 110,
        hp: 140,
        cannonReload: 0.6,
        mgReload: 0.08,
        cannonDamage: 100,
        mgDamage: 25,
        bodyColor: '#c2410c',
        turretColor: '#ea580c',
        ability: 'armor',
        abilityCooldown: 14,
        abilityLabel: 'Q · Armor',
        desc: 'Slow. Heavy. Hard to kill.',
      },
    };

    // ============================================================
    // Map definitions
    // ============================================================
    const MAPS = {
      desert: {
        name: 'Desert',
        desc: 'Wide open. Few hiding spots.',
        width: 1800, height: 1200,
        ground: '#c9a273',
        groundDark: '#a87f50',

        wallColor: '#92400e',

        walls: [
          { x: 240, y: 200, w: 130, h: 35 },
          { x: 1430, y: 250, w: 100, h: 60 },

          { x: 450, y: 700, w: 90, h: 90 },
          { x: 1500, y: 800, w: 150, h: 35 },
          { x: 900, y: 850, w: 110, h: 70 },
          { x: 300, y: 950, w: 60, h: 60 },
          { x: 1200, y: 1050, w: 130, h: 35 },
        ],
      },
      snow: {
        name: 'Snowfield',
        desc: 'Heavy cover. Cold and quiet.',
        width: 1800, height: 1200,
        ground: '#cbd5e1',
        groundDark: '#94a3b8',
        gridColor: 'rgba(71, 85, 105, 0.08)',
        wallColor: '#475569',
        wallBorder: '#1e293b',
        walls: [
          { x: 200, y: 150, w: 80, h: 80 },
          { x: 400, y: 250, w: 50, h: 120 },
          { x: 700, y: 180, w: 120, h: 50 },
          { x: 1000, y: 200, w: 80, h: 80 },
          { x: 1300, y: 150, w: 100, h: 60 },
          { x: 1550, y: 350, w: 60, h: 120 },
          { x: 250, y: 550, w: 120, h: 50 },
          { x: 500, y: 650, w: 60, h: 60 },
          { x: 850, y: 600, w: 80, h: 80 },
          { x: 1100, y: 550, w: 100, h: 60 },
          { x: 1400, y: 700, w: 50, h: 120 },
          { x: 350, y: 850, w: 80, h: 80 },
          { x: 700, y: 950, w: 200, h: 50 },
          { x: 1150, y: 900, w: 80, h: 80 },
        ],
      },
      tropical: {
        name: 'Jungle',
        desc: 'Dense cover. Close fights.',
        width: 1800, height: 1200,
        ground: '#365314',
        groundDark: '#1a2e0a',
        gridColor: 'rgba(20, 83, 45, 0.12)',
        wallColor: '#15803d',
        wallBorder: '#064e3b',
        walls: [
          { x: 150, y: 150, w: 50, h: 50 },
          { x: 280, y: 250, w: 50, h: 50 },
          { x: 450, y: 200, w: 50, h: 50 },
          { x: 600, y: 350, w: 60, h: 60 },
          { x: 800, y: 200, w: 50, h: 50 },
          { x: 950, y: 300, w: 70, h: 50 },
          { x: 1150, y: 200, w: 50, h: 50 },
          { x: 1350, y: 350, w: 50, h: 50 },
          { x: 1500, y: 250, w: 60, h: 60 },
          { x: 250, y: 600, w: 50, h: 50 },
          { x: 450, y: 700, w: 60, h: 60 },
          { x: 700, y: 600, w: 50, h: 50 },
          { x: 900, y: 750, w: 60, h: 60 },
          { x: 1100, y: 650, w: 50, h: 50 },
          { x: 1300, y: 750, w: 50, h: 50 },
          { x: 300, y: 950, w: 60, h: 60 },
          { x: 700, y: 1000, w: 50, h: 50 },
          { x: 1200, y: 950, w: 80, h: 60 },
        ],
      },
      forest: {
        name: 'Forest',
        desc: 'Asymmetric tree cover.',
        width: 1800, height: 1200,
        ground: '#3f3f29',
        groundDark: '#27271a',
        gridColor: 'rgba(63, 63, 41, 0.18)',
        wallColor: '#854d0e',
        wallBorder: '#451a03',
        walls: [
          { x: 200, y: 200, w: 100, h: 100 },
          { x: 500, y: 250, w: 80, h: 120 },
          { x: 800, y: 180, w: 130, h: 90 },
          { x: 1200, y: 220, w: 100, h: 100 },
          { x: 1500, y: 350, w: 130, h: 70 },
          { x: 350, y: 600, w: 130, h: 100 },
          { x: 700, y: 700, w: 100, h: 100 },
          { x: 1050, y: 600, w: 100, h: 130 },
          { x: 1400, y: 750, w: 100, h: 100 },
          { x: 450, y: 950, w: 120, h: 90 },
          { x: 950, y: 1000, w: 100, h: 90 },
        ],
      },
      fulda: {
        name: 'Fulda Pass',
        desc: 'Cold War lanes. Tight corridors.',
        width: 1800, height: 1200,
        ground: '#4d4d3c',
        groundDark: '#2e2e24',
        gridColor: 'rgba(75, 85, 99, 0.12)',
        wallColor: '#525252',
        wallBorder: '#171717',
        walls: [
          { x: 350, y: 100, w: 50, h: 350 },
          { x: 750, y: 100, w: 50, h: 250 },
          { x: 1100, y: 200, w: 50, h: 350 },
          { x: 1450, y: 100, w: 50, h: 300 },
          { x: 500, y: 550, w: 150, h: 60 },
          { x: 950, y: 650, w: 200, h: 60 },
          { x: 250, y: 750, w: 60, h: 200 },
          { x: 600, y: 850, w: 200, h: 60 },
          { x: 1300, y: 800, w: 60, h: 250 },
          { x: 1500, y: 950, w: 200, h: 60 },
        ],
      },
    };

    // ============================================================
    // State
    // ============================================================
    const state = {
      scene: 'menu',       // 'menu' | 'playing' | 'gameover'
      selectedTank: 'medium',
      selectedMap: 'desert',
      map: null,
      tankDef: null,
      player: null,
      enemies: [],
      bullets: [],
      particles: [],
      smokes: [],
      camera: { x: 0, y: 0 },
      score: 0,
      spawnTimer: 2,
      highScore: parseInt(localStorage.getItem('eagle-eye-high') || '0', 10),
      shake: 0,
    };

    // ============================================================
    // Entity factories
    // ============================================================
    function makePlayer() {
      const def = state.tankDef;
      return {
        x: state.map.width / 2, y: state.map.height / 2,
        angle: 0, turretAngle: 0,
        hp: def.hp, maxHp: def.hp,
        speed: def.speed,
        cannonCooldown: 0,
        mgCooldown: 0,
        abilityCooldown: 0,
        abilityActive: 0,    // seconds remaining of effect
        invuln: 0,
        radius: 14,
      };
    }

    function makeEnemy() {
      // spawn at random spot inside the map, at least 500 from the player
      let x, y, tries = 0;
      do {
        x = rand(60, state.map.width - 60);
        y = rand(60, state.map.height - 60);
        tries++;
      } while (dist({ x, y }, state.player) < 500 && tries < 40);
      return {
        x, y,
        angle: 0, turretAngle: 0,
        hp: 100, maxHp: 100,
        speed: rand(40, 60),
        cooldown: rand(2, 3.5),
        radius: 14,
        hitFlash: 0,
      };
    }

    function makeBullet(x, y, angle, owner, type) {
      const speeds = { cannon: 420, mg: 720 };
      const damages = { cannon: 100, mg: 25 };
      return {
        x, y,
        vx: Math.cos(angle) * speeds[type],
        vy: Math.sin(angle) * speeds[type],
        owner, type,
        damage: damages[type],
        life: type === 'cannon' ? 3 : 1.4,
        radius: type === 'cannon' ? 4 : 2.5,
      };
    }

    function spawnParticles(x, y, color, count, spread) {
      const s = spread || 220;
      for (let i = 0; i < count; i++) {
        state.particles.push({
          x, y,
          vx: rand(-s, s),
          vy: rand(-s, s),
          life: rand(0.25, 0.7),
          maxLife: 0.7,
          color,
          radius: rand(1.2, 3),
        });
      }
    }

    function makeSmoke(x, y) {
      return { x, y, life: 5, maxLife: 5, radius: 90 };
    }

    // ============================================================
    // Input
    // ============================================================
    const keys = {};
    const mouse = { x: VIEW_W / 2, y: VIEW_H / 2, left: false, right: false };

    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (!keys[k]) {
        // pressed-this-tick edge
        if (k === 'q' && state.scene === 'playing') tryUseAbility();
      }
      keys[k] = true;
      if (k === ' ') e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = (e.clientX - rect.left) * (VIEW_W / rect.width);
      mouse.y = (e.clientY - rect.top) * (VIEW_H / rect.height);
    });
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) mouse.left = true;
      if (e.button === 2) mouse.right = true;
    });
    window.addEventListener('mouseup', e => {
      if (e.button === 0) mouse.left = false;
      if (e.button === 2) mouse.right = false;
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ============================================================
    // Collisions
    // ============================================================
    function resolveWallCollision(entity) {
      for (const w of state.map.walls) {
        const cx = clamp(entity.x, w.x, w.x + w.w);
        const cy = clamp(entity.y, w.y, w.y + w.h);
        const dx = entity.x - cx;
        const dy = entity.y - cy;
        const d2 = dx * dx + dy * dy;
        if (d2 < entity.radius * entity.radius && d2 > 0.0001) {
          const d = Math.sqrt(d2);
          const overlap = entity.radius - d;
          entity.x += (dx / d) * overlap;
          entity.y += (dy / d) * overlap;
        }
      }
      entity.x = clamp(entity.x, entity.radius, state.map.width - entity.radius);
      entity.y = clamp(entity.y, entity.radius, state.map.height - entity.radius);
    }

    function bulletHitsWall(b) {
      for (const w of state.map.walls) {
        if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) return true;
      }
      return false;
    }

    function isPlayerInSmoke() {
      for (const s of state.smokes) {
        if (dist(s, state.player) < s.radius) return true;
      }
      return false;
    }

    // ============================================================
    // Abilities
    // ============================================================
    function tryUseAbility() {
      const p = state.player;
      if (!p || p.abilityCooldown > 0) return;
      const def = state.tankDef;
      if (def.ability === 'dash') {
        p.abilityActive = 0.3;
        p.invuln = Math.max(p.invuln, 0.6);
      } else if (def.ability === 'smoke') {
        state.smokes.push(makeSmoke(p.x, p.y));
      } else if (def.ability === 'armor') {
        p.invuln = Math.max(p.invuln, 2.5);
        p.abilityActive = 2.5;
      }
      p.abilityCooldown = def.abilityCooldown;
    }

    // ============================================================
    // Update
    // ============================================================
    function updatePlayer(dt) {
      const p = state.player;
      const def = state.tankDef;

      // movement
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup']) dy -= 1;
      if (keys['s'] || keys['arrowdown']) dy += 1;
      if (keys['a'] || keys['arrowleft']) dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;
      const mag = Math.hypot(dx, dy);
      let speedMult = 1;
      if (def.ability === 'dash' && p.abilityActive > 0) speedMult = 2.1;
      if (mag > 0) {
        dx /= mag; dy /= mag;
        p.angle = Math.atan2(dy, dx);
        p.x += dx * p.speed * speedMult * dt;
        p.y += dy * p.speed * speedMult * dt;
      }
      resolveWallCollision(p);

      // aim (convert mouse screen to world)
      const mwX = mouse.x + state.camera.x;
      const mwY = mouse.y + state.camera.y;
      p.turretAngle = Math.atan2(mwY - p.y, mwX - p.x);

      // cooldowns and timers
      p.cannonCooldown = Math.max(0, p.cannonCooldown - dt);
      p.mgCooldown = Math.max(0, p.mgCooldown - dt);
      p.abilityCooldown = Math.max(0, p.abilityCooldown - dt);
      p.abilityActive = Math.max(0, p.abilityActive - dt);
      p.invuln = Math.max(0, p.invuln - dt);

      // fire cannon
      if (mouse.left && p.cannonCooldown <= 0) {
        const mx = p.x + Math.cos(p.turretAngle) * 26;
        const my = p.y + Math.sin(p.turretAngle) * 26;
        state.bullets.push(makeBullet(mx, my, p.turretAngle, 'player', 'cannon'));
        p.cannonCooldown = def.cannonReload;
        spawnParticles(mx, my, '#fdba74', 8, 280);
        state.shake = Math.min(state.shake + 5, 9);
      }

      // fire MG
      if (mouse.right && p.mgCooldown <= 0) {
        const spread = (Math.random() - 0.5) * 0.05;
        const mx = p.x + Math.cos(p.turretAngle) * 22;
        const my = p.y + Math.sin(p.turretAngle) * 22;
        state.bullets.push(makeBullet(mx, my, p.turretAngle + spread, 'player', 'mg'));
        p.mgCooldown = def.mgReload;
        spawnParticles(mx, my, '#fbbf24', 1, 80);
        state.shake = Math.min(state.shake + 0.5, 3);
      }
    }

    function updateEnemies(dt) {
      const p = state.player;
      const playerHidden = isPlayerInSmoke();
      for (const e of state.enemies) {
        const ang = Math.atan2(p.y - e.y, p.x - e.x);
        const d = dist(e, p);

        // hit flash decay
        e.hitFlash = Math.max(0, e.hitFlash - dt);

        // movement: approach if far, strafe if close
        if (d > 250) {
          e.x += Math.cos(ang) * e.speed * dt;
          e.y += Math.sin(ang) * e.speed * dt;
          e.angle = ang;
        } else {
          e.x += Math.cos(ang + Math.PI / 2) * e.speed * 0.4 * dt;
          e.y += Math.sin(ang + Math.PI / 2) * e.speed * 0.4 * dt;
        }
        resolveWallCollision(e);
        e.turretAngle = ang;

        // shoot (only if player visible — not in smoke)
        e.cooldown -= dt;
        if (!playerHidden && e.cooldown <= 0 && d < 520) {
          state.bullets.push(makeBullet(
            e.x + Math.cos(ang) * 22,
            e.y + Math.sin(ang) * 22,
            ang, 'enemy', 'cannon'
          ));
          e.cooldown = rand(2, 3.5);
        } else if (playerHidden && e.cooldown <= 0) {
          // delay shooting while smoked
          e.cooldown = 0.5;
        }
      }
    }

    function updateBullets(dt) {
      const m = state.map;
      for (const b of state.bullets) {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
      }
      state.bullets = state.bullets.filter(b => {
        if (b.life <= 0) return false;
        if (b.x < 0 || b.x > m.width || b.y < 0 || b.y > m.height) return false;
        if (bulletHitsWall(b)) {
          spawnParticles(b.x, b.y, '#94a3b8', 4, 140);
          return false;
        }
        return true;
      });
    }

    function checkBulletHits() {
      const p = state.player;
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        if (b.owner === 'player') {
          for (let j = state.enemies.length - 1; j >= 0; j--) {
            const e = state.enemies[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.radius) {
              e.hp -= b.damage;
              e.hitFlash = 0.12;
              state.bullets.splice(i, 1);
              spawnParticles(b.x, b.y, b.type === 'cannon' ? '#06b6d4' : '#67e8f9', b.type === 'cannon' ? 14 : 5);
              if (e.hp <= 0) {
                state.enemies.splice(j, 1);
                state.score += 10;
                spawnParticles(e.x, e.y, '#0891b2', 22, 320);
                state.shake = Math.min(state.shake + 4, 9);
              }
              break;
            }
          }
        } else {
          // enemy → player
          if (p.invuln <= 0 && Math.hypot(b.x - p.x, b.y - p.y) < p.radius + b.radius) {
            state.bullets.splice(i, 1);
            p.hp -= b.damage;
            spawnParticles(p.x, p.y, '#f97316', 16, 280);
            state.shake = Math.min(state.shake + 6, 12);
            if (p.hp <= 0) {
              p.hp = 0;
              endGame();
            }
          }
        }
      }
    }

    function updateSpawning(dt) {
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        const target = 3 + Math.floor(state.score / 50);
        if (state.enemies.length < target) state.enemies.push(makeEnemy());
        state.spawnTimer = clamp(2.4 - state.score / 800, 0.6, 2.4);
      }
    }

    function updateParticles(dt) {
      for (const pt of state.particles) {
        pt.x += pt.vx * dt;
        pt.y += pt.vy * dt;
        pt.vx *= 0.9;
        pt.vy *= 0.9;
        pt.life -= dt;
      }
      state.particles = state.particles.filter(p => p.life > 0);
    }

    function updateSmokes(dt) {
      for (const s of state.smokes) {
        s.life -= dt;
      }
      state.smokes = state.smokes.filter(s => s.life > 0);
    }

    function updateCamera(dt) {
      const tx = state.player.x - VIEW_W / 2;
      const ty = state.player.y - VIEW_H / 2;
      state.camera.x += (tx - state.camera.x) * Math.min(1, 8 * dt);
      state.camera.y += (ty - state.camera.y) * Math.min(1, 8 * dt);
      state.camera.x = clamp(state.camera.x, 0, state.map.width - VIEW_W);
      state.camera.y = clamp(state.camera.y, 0, state.map.height - VIEW_H);
    }

    // ============================================================
    // Render
    // ============================================================
    function drawTank(tank, bodyColor, turretColor, hitFlash) {
      ctx.save();
      ctx.translate(tank.x, tank.y);
      ctx.rotate(tank.angle);
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(-14, -16, 28, 6);
      ctx.fillRect(-14, 10, 28, 6);
      ctx.fillStyle = hitFlash > 0 ? '#fef3c7' : bodyColor;
      ctx.fillRect(-12, -10, 24, 20);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-12, -10, 24, 20);
      ctx.restore();

      ctx.save();
      ctx.translate(tank.x, tank.y);
      ctx.rotate(tank.turretAngle);
      ctx.fillStyle = hitFlash > 0 ? '#fef3c7' : turretColor;
      ctx.fillRect(0, -2.5, 20, 5);
      ctx.strokeRect(0, -2.5, 20, 5);
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawHpBar(entity, color) {
      if (entity.hp >= entity.maxHp) return;
      const w = 26, h = 4;
      const frac = clamp(entity.hp / entity.maxHp, 0, 1);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(entity.x - w / 2, entity.y - 22, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(entity.x - w / 2, entity.y - 22, w * frac, h);
    }

    function render() {
      const m = state.map;
      ctx.save();
      let shx = 0, shy = 0;
      if (state.shake > 0.05) {
        shx = rand(-state.shake, state.shake);
        shy = rand(-state.shake, state.shake);
        state.shake *= 0.88;
      }
      ctx.translate(-Math.floor(state.camera.x) + shx, -Math.floor(state.camera.y) + shy);

      // ground (only what's visible)
      const cx = state.camera.x, cy = state.camera.y;
      ctx.fillStyle = m.ground;
      ctx.fillRect(cx, cy, VIEW_W, VIEW_H);

      // map edge frame
      ctx.fillStyle = m.groundDark;
      // outside the map (let players see boundary)
      // grid
      ctx.strokeStyle = m.gridColor;
      ctx.lineWidth = 1;
      const gridStartX = Math.floor(cx / 60) * 60;
      const gridStartY = Math.floor(cy / 60) * 60;
      for (let x = gridStartX; x < cx + VIEW_W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(x, cy + VIEW_H); ctx.stroke();
      }
      for (let y = gridStartY; y < cy + VIEW_H; y += 60) {
        ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx + VIEW_W, y); ctx.stroke();
      }

      // map boundary line
      ctx.strokeStyle = m.wallBorder;
      ctx.lineWidth = 3;
      ctx.strokeRect(0, 0, m.width, m.height);

      // walls
      ctx.fillStyle = m.wallColor;
      ctx.strokeStyle = m.wallBorder;
      ctx.lineWidth = 1.5;
      for (const w of m.walls) {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeRect(w.x, w.y, w.w, w.h);
      }

      // smoke (under tanks)
      for (const s of state.smokes) {
        const a = clamp(s.life / s.maxLife, 0, 1);
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
        grad.addColorStop(0, `rgba(200, 200, 200, ${0.75 * a})`);
        grad.addColorStop(1, `rgba(200, 200, 200, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // bullets
      for (const b of state.bullets) {
        if (b.type === 'cannon') {
          ctx.fillStyle = b.owner === 'player' ? '#fdba74' : '#67e8f9';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          // MG tracer-style
          ctx.fillStyle = '#fbbf24';
          const tl = 10;
          const tx = b.x - Math.cos(Math.atan2(b.vy, b.vx)) * tl;
          const ty = b.y - Math.sin(Math.atan2(b.vy, b.vx)) * tl;
          ctx.strokeStyle = '#fbbf24';
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(tx, ty);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }

      // enemies + hp bars
      for (const e of state.enemies) {
        drawTank(e, '#0891b2', '#06b6d4', e.hitFlash);
        drawHpBar(e, '#06b6d4');
      }

      // player
      const p = state.player;
      if (p) {
        const bodyC = p.invuln > 0 ? '#fde047' : state.tankDef.bodyColor;
        const turC = p.invuln > 0 ? '#fef08a' : state.tankDef.turretColor;
        drawTank(p, bodyC, turC, 0);
        if (p.invuln > 0) {
          ctx.strokeStyle = 'rgba(253, 224, 71, 0.7)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // particles
      for (const pt of state.particles) {
        ctx.globalAlpha = clamp(pt.life / pt.maxLife, 0, 1);
        ctx.fillStyle = pt.color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    // ============================================================
    // HUD
    // ============================================================
    const hpFill = document.getElementById('hp-fill');
    const abilityFill = document.getElementById('ability-fill');
    const abilityLabel = document.getElementById('ability-label');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const tankNameEl = document.getElementById('tank-name');
    const mapNameEl = document.getElementById('map-name');

    function updateHud() {
      scoreEl.textContent = state.score;
      bestEl.textContent = Math.max(state.score, state.highScore);
      if (state.player && state.tankDef) {
        hpFill.style.width = (100 * Math.max(0, state.player.hp) / state.player.maxHp) + '%';
        const aFrac = state.player.abilityCooldown > 0
          ? 1 - state.player.abilityCooldown / state.tankDef.abilityCooldown
          : 1;
        abilityFill.style.width = (100 * aFrac) + '%';
        abilityLabel.textContent = state.player.abilityCooldown > 0
          ? `${state.tankDef.abilityLabel} (${state.player.abilityCooldown.toFixed(1)}s)`
          : state.tankDef.abilityLabel + ' · ready';
      }
      if (state.tankDef) tankNameEl.textContent = state.tankDef.name;
      if (state.map) mapNameEl.textContent = state.map.name;
    }

    // ============================================================
    // Menu
    // ============================================================
    function buildMenu() {
      const tankCards = document.getElementById('tank-cards');
      const mapCards = document.getElementById('map-cards');
      tankCards.innerHTML = '';
      mapCards.innerHTML = '';

      for (const [key, def] of Object.entries(TANKS)) {
        const card = document.createElement('div');
        card.className = 'card' + (state.selectedTank === key ? ' is-selected' : '');
        card.dataset.tank = key;
        card.innerHTML = `
          <div class="card__name">${def.name}</div>
          <div class="card__stat">HP <strong>${def.hp}</strong> · Speed <strong>${def.speed}</strong></div>
          <div class="card__stat">Cannon reload <strong>${def.cannonReload}s</strong></div>
          <div class="card__desc">${def.desc}<br/><strong style="color:#06b6d4">${def.abilityLabel}</strong></div>
        `;
        card.addEventListener('click', () => {
          state.selectedTank = key;
          tankCards.querySelectorAll('.card').forEach(c => c.classList.remove('is-selected'));
          card.classList.add('is-selected');
        });
        tankCards.appendChild(card);
      }

      for (const [key, def] of Object.entries(MAPS)) {
        const card = document.createElement('div');
        card.className = 'card' + (state.selectedMap === key ? ' is-selected' : '');
        card.dataset.map = key;
        card.innerHTML = `
          <div class="card__name">${def.name}</div>
          <div class="card__desc">${def.desc}</div>
          <div class="card__stat">Size <strong>${def.width}×${def.height}</strong> · <strong>${def.walls.length}</strong> cover</div>
        `;
        card.addEventListener('click', () => {
          state.selectedMap = key;
          mapCards.querySelectorAll('.card').forEach(c => c.classList.remove('is-selected'));
          card.classList.add('is-selected');
        });
        mapCards.appendChild(card);
      }
    }

    document.getElementById('start-button').addEventListener('click', startGame);
    document.getElementById('restart-button').addEventListener('click', () => {
      document.getElementById('game-over').classList.add('hidden');
      document.getElementById('menu').classList.remove('hidden');
      state.scene = 'menu';
    });

    function startGame() {
      state.tankDef = TANKS[state.selectedTank];
      state.map = MAPS[state.selectedMap];
      state.player = makePlayer();
      state.enemies = [];
      state.bullets = [];
      state.particles = [];
      state.smokes = [];
      state.score = 0;
      state.spawnTimer = 1.5;
      state.shake = 0;
      state.camera.x = state.player.x - VIEW_W / 2;
      state.camera.y = state.player.y - VIEW_H / 2;
      state.scene = 'playing';
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('game-over').classList.add('hidden');
    }

    function endGame() {
      state.scene = 'gameover';
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('eagle-eye-high', String(state.score));
      }
      document.getElementById('final-score').textContent = state.score;
      document.getElementById('high-score').textContent = state.highScore;
      document.getElementById('game-over').classList.remove('hidden');
    }

    // ============================================================
    // Main loop
    // ============================================================
    let last = 0;
    function loop(now) {
      const dt = Math.min(0.05, (now - last) / 1000) || 0;
      last = now;

      if (state.scene === 'playing') {
        updatePlayer(dt);
        updateEnemies(dt);
        updateBullets(dt);
        checkBulletHits();
        updateSpawning(dt);
        updateSmokes(dt);
        updateCamera(dt);
      }
      updateParticles(dt);

      // render
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, VIEW_W, VIEW_H);
      if (state.scene !== 'menu' && state.map) render();
      updateHud();
      requestAnimationFrame(loop);
    }

    buildMenu();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
